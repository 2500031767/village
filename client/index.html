<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Seetharampuram Thanda - A Digital Village Platform. Comprehensive data-driven dashboard showcasing demographics, agriculture, education, healthcare, and development initiatives." />
    <meta name="keywords" content="Seetharampuram, Thanda, Digital Village, Nellore, Andhra Pradesh, UBA, KLEF, Smart Village" />
    <meta name="author" content="KL Education Foundation" />
    <title>Seetharampuram Thanda | Digital Village Platform</title>

    <!-- Google Translate -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            includedLanguages: 'en,te,hi',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false,
          },
          'google_translate_element'
        );
      }
    </script>
    <script
      type="text/javascript"
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
    ></script>

    <style>
      /* Hide Google's default ugly bar and branding */
      .goog-te-banner-frame, .goog-te-balloon-frame { display: none !important; }
      body { top: 0 !important; }
      .skiptranslate { display: none !important; }
      #google_translate_element { display: none; }
      /* Remove the translate widget's default iframe border */
      .goog-te-menu-value span { font-size: 0 !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="google_translate_element"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
